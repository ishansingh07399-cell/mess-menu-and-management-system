<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Mess | Premium Dining Experience</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- 1. CORE VARIABLES & RESET --- */
        :root {
            --brand: #ff4d4d;
            --brand-orange: #ff9f43;
            --bg-main: #0a0a0b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --sidebar-width: 288px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        html {
            background-color: var(--bg-main);
        }

        body {
            background-color: transparent; /* Changed to let 3D canvas show through */
            color: white;
            overflow-x: hidden;
        }

        /* --- NEW: 3D BACKGROUND CANVAS --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* Keeps it behind all content */
            pointer-events: none; /* Allows clicking through to buttons */
        }

        /* --- 2. LAYOUT ENGINE --- */
        #app {
            display: flex;
            align-items: flex-start;
        }

        .hidden { display: none !important; }

        aside {
            width: var(--sidebar-width);
            background: rgba(10, 10, 11, 0.75); /* Made slightly more transparent for 3D effect */
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            z-index: 50;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        main {
            flex: 1;
            position: relative;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: rgba(10, 10, 11, 0.6); /* Made slightly more transparent */
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-mount {
            width: 100%;
        }

        .page-section {
            min-height: 100vh;
            padding: 5rem 3rem;
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* --- 3. HERO SLIDER & HOVER EFFECTS --- */
        .hero-slider-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }

        .bg-slide {
            position: absolute;
            inset: -5%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: heroCrossfade 16s infinite ease-in-out;
        }

        .bg-slide:nth-child(1) { background-image: url('https://images.unsplash.com/photo-1631515243349-e0cb75fb8d3a?w=1200'); animation-delay: 0s; }
        .bg-slide:nth-child(2) { background-image: url('https://images.unsplash.com/photo-1513104890d38-7c0f4fff20b8?w=1200'); animation-delay: 4s; }
        .bg-slide:nth-child(3) { background-image: url('https://images.unsplash.com/photo-1601050690597-df0568f70950?w=1200'); animation-delay: 8s; }
        .bg-slide:nth-child(4) { background-image: url('https://images.unsplash.com/photo-1585937421612-70a008356fbe?w=1200'); animation-delay: 12s; }

        @keyframes heroCrossfade {
            0% { opacity: 0; transform: scale(1); }
            10% { opacity: 0.5; }
            25% { opacity: 0.5; transform: scale(1.03); }
            35% { opacity: 0; transform: scale(1.05); }
            100% { opacity: 0; transform: scale(1); }
        }

        .hover-lift {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .hover-lift:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(255, 77, 77, 0.4);
            box-shadow: 0 20px 40px rgba(255, 77, 77, 0.15);
        }

        /* --- 4. REUSABLE COMPONENTS --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.02); /* Adjusted for better 3D visibility */
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
        }

        .bg-gradient-brand {
            background: linear-gradient(135deg, var(--brand), var(--brand-orange));
        }

        .text-brand { color: var(--brand); }

        .btn-brand {
            background: linear-gradient(135deg, var(--brand), var(--brand-orange));
            border: none;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .nav-link {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 700;
            text-align: left;
        }

        .nav-link.active {
            background: var(--brand);
            color: white;
            box-shadow: 0 8px 20px rgba(255, 77, 77, 0.3);
        }

        #preloader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .glow-circle {
            width: 100px;
            height: 100px;
            border: 8px solid var(--glass-border);
            border-top: 8px solid var(--brand);
            border-radius: 50%;
            animation: rotate 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.2);
            margin: 0 auto 20px;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* Dashboard & Utilities */
        .grid-dashboard-3 { display: grid; grid-template-columns: 1.2fr 1.5fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        @media (max-width: 1100px) { .grid-dashboard-3 { grid-template-columns: 1fr; } }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .nutrition-bar-bg { height: 4px; width: 100%; background: rgba(255,255,255,0.05); border-radius: 50px; overflow: hidden; margin-top: 8px; }
        .nutrition-fill { height: 100%; background: var(--brand); }
        
        /* Poll Bar Utilities */
        .poll-bar-container { display: flex; height: 10px; width: 100%; background: rgba(255,255,255,0.05); border-radius: 8px; overflow: hidden; margin-top: 0.5rem; }
        .poll-bar-veg { background: linear-gradient(90deg, #16a34a, #22c55e); transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .poll-bar-nonveg { background: linear-gradient(90deg, #dc2626, #ef4444); transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
        .food-card { overflow: hidden; border-radius: 20px; }
        .food-img-header { height: 160px; width: 100%; background-size: cover; background-position: center; position: relative; }
        
        .input-field { 
            width: 100%; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            border-radius: 12px; 
            padding: 0.75rem 1rem; 
            color: white; 
            outline: none; 
            transition: border-color 0.3s; 
        }
        .input-field:focus { border-color: var(--brand); }
        select.input-field option { background: #1a1a1c; color: white; }

        #chatbot-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 100; }
        .chat-btn { width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .chat-window { width: 340px; height: 400px; display: none; flex-direction: column; margin-bottom: 1rem; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>

<body>

    <canvas id="bg-canvas"></canvas>

    <div id="preloader">
        <div style="text-align: center;">
            <div class="glow-circle"></div>
            <h1 style="font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #fff, #ff4d4d); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Smart AI Mess</h1>
            <p style="color: rgba(255,255,255,0.4); letter-spacing: 0.3em; text-transform: uppercase; font-size: 10px; margin-top: 8px;">Loading your experience...</p>
        </div>
    </div>

    <div id="toast-container" style="position: fixed; top: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px;"></div>

    <div id="app" class="hidden">
        <aside>
            <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2.5rem; padding: 0 0.5rem;">
                <div class="bg-gradient-brand" style="width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);">
                    <i class="fas fa-utensils" style="color: white;"></i>
                </div>
                <h2 style="font-size: 1.25rem; font-weight: 700; letter-spacing: -0.025em;">Smart<span class="text-brand">Mess</span></h2>
            </div>
            <nav id="nav-menu" style="flex: 1;"></nav>
            <div id="user-brief-sidebar" style="margin-top: auto; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1);"></div>
        </aside>

        <main>
            <header>
                <h2 id="page-title" style="font-size: 0.75rem; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.2em;">Home</h2>
                <div style="display: flex; align-items: center; gap: 1.5rem;">
                    <div id="admin-indicator" class="hidden" style="padding: 0.25rem 0.75rem; border-radius: 9999px; background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.2); font-size: 10px; color: var(--brand); font-weight: 700; text-transform: uppercase;">Admin Mode</div>
                    <button id="logout-btn" style="background: none; border: none; color: white; font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: 0.1em;">LOGOUT</button>
                </div>
            </header>
            <div id="content-mount" class="content-mount"></div>
        </main>
    </div>

    <div id="chatbot-container">
        <div id="chat-window" class="glass-card chat-window shadow-2xl">
            <div class="bg-gradient-brand" style="padding: 1rem; font-weight: 700; display: flex; justify-content: space-between; align-items: center; border-radius: 24px 24px 0 0;">
                <span style="font-size: 0.75rem;"><i class="fas fa-robot" style="margin-right: 0.5rem;"></i> Mess AI Assistant</span>
                <button onclick="toggleChat()" style="background: none; border: none; color: white; cursor: pointer;"><i class="fas fa-times"></i></button>
            </div>
            <div id="chat-messages" style="flex: 1; padding: 1rem; overflow-y: auto; font-size: 12px; display: flex; flex-direction: column; gap: 12px;"></div>
            <div style="padding: 0.75rem; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 0.5rem;">
                <input type="text" id="chat-input" class="input-field" style="padding: 0.5rem 1rem; font-size: 12px;" placeholder="Ask menu or bill...">
                <button id="chat-send" style="background: none; border: none; color: var(--brand); cursor: pointer;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <button onclick="toggleChat()" class="chat-btn bg-gradient-brand">
            <i class="fas fa-comment-dots" style="color: white;"></i>
        </button>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const DEFAULT_MENU = [
            { id: 0, day: "Monday", breakfast: "Poha & Jalebi", lunch: "Rajma Chawal, Roti, Salad", dinner: "Paneer Butter Masala, Naan, Dal", calories: "2100", img: "https://images.unsplash.com/photo-1565557612140-5e39665bc783?w=800" },
            { id: 1, day: "Tuesday", breakfast: "Aloo Paratha & Curd", lunch: "Chole Bhature, Lassi", dinner: "Mix Veg, Tandoori Roti, Rice", calories: "2350", img: "https://images.unsplash.com/photo-1626132647523-66f5bf380027?w=800" },
            { id: 2, day: "Wednesday", breakfast: "Idli Sambar", lunch: "Kadhi Pakora, Rice", dinner: "Egg Curry / Malai Kofta, Pulao", calories: "1950", img: "https://images.unsplash.com/photo-1589301760014-d929f3979dbc?w=800" },
            { id: 3, day: "Thursday", breakfast: "Bread Omelet", lunch: "Dal Makhani, Jeera Rice", dinner: "Chicken Curry / Shahi Paneer", calories: "2200", img: "https://images.unsplash.com/photo-1603894584373-5ac82b2ae398?w=800" },
            { id: 4, day: "Friday", breakfast: "Upma & Tea", lunch: "Aloo Gobi, Dal Tadka", dinner: "Veg Biryani, Raita", calories: "2050", img: "https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?w=800" },
            { id: 5, day: "Saturday", breakfast: "Puri Sabzi", lunch: "Masala Dosa", dinner: "Manchurian & Fried Rice", calories: "2400", img: "https://images.unsplash.com/photo-1618161110532-6bfbba1a520f?w=800" },
            { id: 6, day: "Sunday", breakfast: "Chole Bhature", lunch: "Special Sunday Thali", dinner: "Pav Bhaji", calories: "2600", img: "https://images.unsplash.com/photo-1606491956689-2ea866880c84?w=800" }
        ];

        let state = {
            user: JSON.parse(localStorage.getItem('mess_user')) || null,
            feedback: JSON.parse(localStorage.getItem('mess_feedback')) || [],
            attendance: JSON.parse(localStorage.getItem('mess_attendance')) || {},
            preference: localStorage.getItem('mess_pref') || null,
            poll: { veg: 420, nonVeg: 180 },
            menu: JSON.parse(localStorage.getItem('mess_menu')) || DEFAULT_MENU,
            bill: 2450
        };

        window.onload = () => {
            init3DBackground(); // Start 3D rendering immediately
            setTimeout(() => {
                const loader = document.getElementById('preloader');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    document.getElementById('app').classList.remove('hidden');
                    init();
                }, 800);
            }, 2000);
        };

        // --- NEW: 3D THREE.JS BACKGROUND LOGIC ---
        function init3DBackground() {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a0a0b, 0.0015); // Matches background color

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 250;

            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // 1. Particle Field (Stars/Atoms)
            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 700;
            const posArray = new Float32Array(particlesCount * 3);
            for(let i = 0; i < particlesCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 1000;
            }
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const particlesMaterial = new THREE.PointsMaterial({
                size: 2,
                color: 0xff4d4d, // Brand red
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });
            const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particlesMesh);

            // 2. Large Outer Atomic Core (Wireframe Icosahedron)
            const coreGeo = new THREE.IcosahedronGeometry(120, 1);
            const coreMat = new THREE.MeshBasicMaterial({
                color: 0xff4d4d, // Brand red
                wireframe: true,
                transparent: true,
                opacity: 0.08
            });
            const coreMesh = new THREE.Mesh(coreGeo, coreMat);
            coreMesh.position.x = 80; // Offset to the right
            scene.add(coreMesh);

            // 3. Inner Atomic Core
            const innerCoreGeo = new THREE.IcosahedronGeometry(60, 0);
            const innerCoreMat = new THREE.MeshBasicMaterial({
                color: 0xff9f43, // Brand orange
                wireframe: true,
                transparent: true,
                opacity: 0.15
            });
            const innerCoreMesh = new THREE.Mesh(innerCoreGeo, innerCoreMat);
            innerCoreMesh.position.x = 80;
            scene.add(innerCoreMesh);

            // Parallax interaction
            let mouseX = 0;
            let mouseY = 0;
            document.addEventListener('mousemove', (event) => {
                mouseX = event.clientX / window.innerWidth - 0.5;
                mouseY = event.clientY / window.innerHeight - 0.5;
            });

            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);
                const elapsedTime = clock.getElapsedTime();

                // Slowly rotate particles
                particlesMesh.rotation.y = elapsedTime * 0.03;
                particlesMesh.rotation.x = elapsedTime * 0.02;

                // Rotate the atomic structures in opposite directions
                coreMesh.rotation.y = elapsedTime * 0.1;
                coreMesh.rotation.z = elapsedTime * 0.05;
                
                innerCoreMesh.rotation.y = -elapsedTime * 0.15;
                innerCoreMesh.rotation.x = elapsedTime * 0.1;

                // Subtle camera movement based on mouse
                camera.position.x += (mouseX * 30 - camera.position.x) * 0.05;
                camera.position.y += (-mouseY * 30 - camera.position.y) * 0.05;
                camera.lookAt(scene.position);

                renderer.render(scene, camera);
            }
            animate();

            // Handle Resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function init() {
            if (!state.user) { 
                renderAuth(); 
            } else { 
                renderNav(); 
                renderAllSections(); 
                setupGlobalEvents(); 
                const tl = gsap.timeline();
                tl.from("aside", { x: -50, opacity: 0, duration: 0.8, ease: "power3.out" })
                  .from("header", { y: -20, opacity: 0, duration: 0.6, ease: "power3.out" }, "-=0.6")
                  .from(".chat-btn", { scale: 0, opacity: 0, duration: 0.5, ease: "back.out(1.7)" }, "-=0.4");
                gsap.to(".chat-btn", { y: -8, duration: 1.5, repeat: -1, yoyo: true, ease: "sine.inOut" });
            }
        }

        function scrollToSection(id) {
            const section = document.getElementById(id);
            if (section) {
                const offset = 80;
                const bodyRect = document.body.getBoundingClientRect().top;
                const elementRect = section.getBoundingClientRect().top;
                const offsetPosition = (elementRect - bodyRect) - offset;
                window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
            }
        }

        function renderNav() {
            const nav = document.getElementById('nav-menu');
            const links = [
                { id: 'home', icon: 'fa-house', label: 'Home' },
                { id: 'dashboard', icon: 'fa-chart-line', label: 'Dashboard' },
                { id: 'menu', icon: 'fa-utensils', label: 'Menu' },
                { id: 'feedback', icon: 'fa-comment-alt', label: 'Feedback' },
                { id: 'profile', icon: 'fa-user', label: 'Profile' }
            ];
            nav.innerHTML = links.map(link => `
                <button onclick="scrollToSection('${link.id}')" data-target="${link.id}" class="nav-link">
                    <i class="fas ${link.icon}" style="font-size: 1.125rem;"></i>
                    <span style="font-size: 0.875rem; letter-spacing: 0.025em;">${link.label}</span>
                </button>
            `).join('');
            document.querySelector('[data-target="home"]')?.classList.add('active');
            if(state.user) {
                if(state.user.role === 'admin') document.getElementById('admin-indicator').classList.remove('hidden');
                document.getElementById('user-brief-sidebar').innerHTML = `
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <div class="bg-gradient-brand" style="width: 40px; height: 40px; border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-weight: 700;">${state.user.name[0]}</div>
                        <div><p style="font-size: 14px; font-weight: 700;">${state.user.name}</p><p style="font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase;">${state.user.role}</p></div>
                    </div>`;
            }
        }

        function renderAllSections() {
            const mount = document.getElementById('content-mount');
            mount.innerHTML = `
                <section id="home" class="page-section">${getHomeHTML()}</section>
                <section id="dashboard" class="page-section">${getDashboardHTML()}</section>
                <section id="menu" class="page-section">${getMenuHTML()}</section>
                <section id="feedback" class="page-section">${getFeedbackHTML()}</section>
                <section id="profile" class="page-section">${getProfileHTML()}</section>
            `;
            setTimeout(() => {
                initDashboardChart();
                initScrollSpy();
                gsap.from(".poll-bar-veg, .poll-bar-nonveg", { width: 0, duration: 1.5, ease: "power3.out", delay: 0.5 });
            }, 100);
        }

        function initScrollSpy() {
            const sections = ['home', 'dashboard', 'menu', 'feedback', 'profile'];
            sections.forEach(id => {
                const section = document.getElementById(id);
                if (!section) return;
                gsap.from(section.children, {
                    y: 50, opacity: 0, duration: 0.8, stagger: 0.15,
                    scrollTrigger: { trigger: section, start: "top 80%", toggleActions: "play none none none" }
                });
                ScrollTrigger.create({
                    trigger: section, start: "top 50%", end: "bottom 50%",
                    onToggle: self => {
                        if (self.isActive) {
                            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                            document.querySelector(`.nav-link[data-target="${id}"]`)?.classList.add('active');
                            document.getElementById('page-title').innerText = id.toUpperCase();
                        }
                    }
                });
            });
        }

        function getHomeHTML() {
            return `
                <div style="position: relative; height: 450px; border-radius: 40px; overflow: hidden; display: flex; align-items: center; padding: 0 3rem; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 3rem;">
                    <div class="hero-slider-container">
                        <div class="bg-slide"></div><div class="bg-slide"></div><div class="bg-slide"></div><div class="bg-slide"></div>
                    </div>
                    <div style="position: absolute; inset: 0; background: linear-gradient(to right, #000 0%, rgba(0,0,0,0.85) 45%, transparent 100%); z-index: 5;"></div>
                    <div style="position: relative; z-index: 10; max-width: 48rem;">
                        <span style="color: var(--brand); font-weight: 700; text-transform: uppercase; letter-spacing: 0.3em; font-size: 10px;">Intelligent Dining Ecosystem</span>
                        <h1 style="font-size: 3.75rem; font-weight: 800; margin: 1rem 0 1.5rem; line-height: 1.1; white-space: nowrap;">Next-Gen Dining, <br><span class="text-brand">Starts Here.</span></h1>
                        <button onclick="scrollToSection('menu')" class="btn-brand hover-lift" style="padding: 1rem 2.5rem; border-radius: 9999px; font-size: 1rem; box-shadow: 0 10px 20px rgba(255,77,77,0.3);">Explore Today's Menu</button>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;">
                    ${renderStatCard('Predictive Taste AI', 'Instant feedback analysis to perfect every recipe.', 'fa-brain')}
                    ${renderStatCard('Zero Waste', 'Smart meal attendance tracking.', 'fa-leaf')}
                    ${renderStatCard('Chef-Curated Meals', 'Elevated campus nutrition with uncompromising quality.', 'fa-fire')}
                </div>`;
        }

        function renderStatCard(t, d, i) {
            return `<div class="glass-card hover-lift" style="padding: 2.5rem;">
                <div class="text-brand" style="font-size: 1.5rem; margin-bottom: 1rem;"><i class="fas ${i}"></i></div>
                <h4 style="font-weight: 700; margin-bottom: 0.5rem;">${t}</h4>
                <p style="color: rgba(255,255,255,0.4); font-size: 12px; line-height: 1.6;">${d}</p>
            </div>`;
        }

        function getDashboardHTML() {
            const total = state.poll.veg + state.poll.nonVeg;
            const vegPct = total === 0 ? 50 : Math.round((state.poll.veg / total) * 100);
            const nonVegPct = 100 - vegPct;

            return `
                <div style="margin-bottom: 2.5rem;"><h2 style="font-size: 1.875rem; font-weight: 700;">Your Dashboard</h2></div>
                
                <div class="grid-dashboard-3">
                    <div class="glass-card hover-lift" style="padding: 2rem; background: linear-gradient(to bottom right, rgba(255,77,77,0.1), transparent);">
                        <h3 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem;">Meal Attendance</h3>
                        <p style="color: rgba(255,255,255,0.4); font-size: 14px; margin-bottom: 2rem;">Are you eating for <span style="color: white; font-weight: 700;">Dinner</span> today?</p>
                        <div style="display: flex; gap: 1rem;">
                            <button onclick="markAttendance('eat')" class="btn-brand" style="flex: 1; padding: 1rem; border-radius: 1rem;">I'M EATING</button>
                            <button onclick="markAttendance('skip')" class="glass-card" style="flex: 1; padding: 1rem; border-radius: 1rem; color: white; font-weight: 700; cursor: pointer;">SKIP MEAL</button>
                        </div>
                    </div>

                    <div class="glass-card hover-lift" style="padding: 2rem;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                            <div>
                                <h3 style="font-size: 1.25rem; font-weight: 700;">Dietary Preference</h3>
                                <p style="color: rgba(255,255,255,0.4); font-size: 12px;">Live Campus Poll</p>
                            </div>
                            <div style="display: flex; gap: 0.5rem; font-size: 1.25rem;">
                                <i class="fas fa-leaf" style="color: #22c55e;"></i>
                                <i class="fas fa-drumstick-bite" style="color: #ef4444;"></i>
                            </div>
                        </div>

                        <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                            <button onclick="setPreference('veg')" class="glass-card" style="flex: 1; padding: 0.75rem; border-radius: 1rem; color: white; font-weight: 700; cursor: pointer; border: 1px solid ${state.preference === 'veg' ? '#22c55e' : 'rgba(255,255,255,0.1)'}; background: ${state.preference === 'veg' ? 'rgba(34, 197, 94, 0.2)' : 'rgba(255,255,255,0.05)'}; transition: all 0.3s;">
                                🥬 VEG
                            </button>
                            <button onclick="setPreference('nonveg')" class="glass-card" style="flex: 1; padding: 0.75rem; border-radius: 1rem; color: white; font-weight: 700; cursor: pointer; border: 1px solid ${state.preference === 'nonveg' ? '#ef4444' : 'rgba(255,255,255,0.1)'}; background: ${state.preference === 'nonveg' ? 'rgba(239, 68, 68, 0.2)' : 'rgba(255,255,255,0.05)'}; transition: all 0.3s;">
                                🍗 NON-VEG
                            </button>
                        </div>

                        <div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: 700;">
                            <span style="color: #22c55e;">${vegPct}% VEGETARIAN</span>
                            <span style="color: #ef4444;">${nonVegPct}% NON-VEG</span>
                        </div>
                        <div class="poll-bar-container">
                            <div class="poll-bar-veg" style="width: ${vegPct}%"></div>
                            <div class="poll-bar-nonveg" style="width: ${nonVegPct}%"></div>
                        </div>
                    </div>

                    <div class="glass-card hover-lift" style="padding: 2rem; display: flex; flex-direction: column; justify-content: center; text-align: center;">
                        <p style="font-size: 10px; text-transform: uppercase; font-weight: 700; color: rgba(255,255,255,0.4);">Current Bill</p>
                        <h2 style="font-size: 3rem; font-weight: 800;">₹${state.bill}</h2>
                        <p class="text-brand" style="font-size: 12px; margin-top: 0.75rem; font-weight: 700;">+12% from last month</p>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="glass-card hover-lift" style="padding: 1.5rem;"><canvas id="chart-attendance" height="200"></canvas></div>
                    <div class="glass-card hover-lift" style="padding: 1.5rem;">
                        <h3 style="font-size: 14px; font-weight: 700; margin-bottom: 1.5rem; color: rgba(255,255,255,0.4); text-transform: uppercase;">Daily Nutrition</h3>
                        <div style="display: flex; flex-direction: column; gap: 1rem;">
                            ${renderNutri('Protein', 85, '#60a5fa')} ${renderNutri('Carbs', 60, '#fb923c')} ${renderNutri('Vitamins', 95, '#4ade80')}
                        </div>
                    </div>
                </div>`;
        }

        function setPreference(type) {
            if (state.preference === type) return;
            if (state.preference === 'veg') state.poll.veg--;
            if (state.preference === 'nonveg') state.poll.nonVeg--;
            state.preference = type;
            if (type === 'veg') state.poll.veg++;
            if (type === 'nonveg') state.poll.nonVeg++;
            localStorage.setItem('mess_pref', type);
            toast(type === 'veg' ? "🥬 Veg preference recorded!" : "🍗 Non-Veg preference recorded!");
            
            const dashSection = document.getElementById('dashboard');
            if(dashSection) {
                dashSection.innerHTML = getDashboardHTML();
                initDashboardChart();
                gsap.from(".poll-bar-veg, .poll-bar-nonveg", { width: 0, duration: 1, ease: "power3.out" });
            }
        }

        function renderNutri(l, p, c) {
            return `<div><div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: 700;"><span style="color: ${c}">${l}</span><span>${p}%</span></div>
                <div class="nutrition-bar-bg"><div class="nutrition-fill" style="width: ${p}%; background: ${c}"></div></div></div>`;
        }

        function getMenuHTML() {
            return `
                <div style="margin-bottom: 2.5rem;"><h2 style="font-size: 1.875rem; font-weight: 700;">Weekly Curation</h2><p style="color: rgba(255,255,255,0.4);">Zomato-style premium meals</p></div>
                <div class="menu-grid">
                    ${state.menu.map((item, idx) => `
                        <div class="glass-card food-card hover-lift">
                            <div class="food-img-header" style="background-image: url('${item.img}')">
                                <div style="position: absolute; inset: 0; background: linear-gradient(to top, #000, transparent);"></div>
                                <span style="position: absolute; bottom: 12px; right: 12px; font-size: 10px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 9999px;">⭐ ${(4 + Math.random()).toFixed(1)}</span>
                            </div>
                            <div style="padding: 1rem; display: flex; flex-direction: column; gap: 0.25rem;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem;">
                                    <h3 style="font-weight: 700; font-size: 1rem;">${item.day}</h3>
                                    <span style="font-size: 10px; color: rgba(255,255,255,0.4);">${item.calories} KCAL</span>
                                </div>
                                <p style="font-size: 12px; color: rgba(255,255,255,0.8);"><span class="text-brand" style="font-weight:700;">B:</span> ${item.breakfast}</p>
                                <p style="font-size: 12px; color: rgba(255,255,255,0.8);"><span class="text-brand" style="font-weight:700;">L:</span> ${item.lunch}</p>
                                <p style="font-size: 12px; color: rgba(255,255,255,0.8);"><span class="text-brand" style="font-weight:700;">D:</span> ${item.dinner}</p>
                            </div>
                        </div>`).join('')}
                </div>`;
        }

        function getFeedbackHTML() {
            return `
                <div style="display: flex; flex-direction: column; gap: 4rem; align-items: center; width: 100%;">
                    
                    <div style="max-width: 600px; width: 100%; text-align: center;">
                        <h2 style="font-size: 1.875rem; font-weight: 700; margin-bottom: 1.5rem;">AI Feedback Engine</h2>
                        <div class="glass-card hover-lift" style="padding: 2.5rem; background: #121212;">
                            <div style="display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem; font-size: 2.5rem;">
                                <span class="hover-lift" style="cursor: pointer; transition: transform 0.2s;" onclick="toast('Loved it!')">😍</span>
                                <span class="hover-lift" style="cursor: pointer; transition: transform 0.2s;" onclick="toast('It was okay')">😐</span>
                                <span class="hover-lift" style="cursor: pointer; transition: transform 0.2s;" onclick="toast('Needs improvement')">😡</span>
                            </div>
                            <textarea id="fb-text" class="input-field" style="height: 100px; margin-bottom: 1.5rem; background: #1a1a1c; border-color: rgba(255,255,255,0.1);" placeholder="Describe your experience... (e.g., 'The Paneer was amazing!')"></textarea>
                            <button onclick="submitFeedback()" class="btn-brand hover-lift" style="width: 100%; padding: 1rem; border-radius: 1rem; box-shadow: 0 10px 20px rgba(255,77,77,0.2); font-size: 1rem;">SUBMIT TO AI</button>
                        </div>
                        <div id="feedback-list" style="margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem;"></div>
                    </div>

                    <div class="glass-card hover-lift" style="padding: 2.5rem; max-width: 600px; width: 100%;">
                        <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem;">Issue Reporting System</h2>
                        <p style="color: rgba(255,255,255,0.4); font-size: 10px; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 0.1em;">Official Committee Portal</p>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                            <select class="input-field"><option>CSE</option><option>ECE</option></select>
                            <select class="input-field"><option>1st Year</option><option>2nd Year</option></select>
                        </div>
                        <select class="input-field" style="margin-bottom: 1rem;"><option>Food Quality Issue</option><option>Hygiene Issue</option></select>
                        <textarea class="input-field" style="height: 128px; margin-bottom: 1.5rem;" placeholder=""></textarea>
                        
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label class="glass-card hover-lift" style="cursor: pointer; padding: 0.75rem 1.5rem; font-size: 12px; font-weight: 700; background: rgba(255,255,255,0.05);">
                                ATTACH EVIDENCE <input type="file" style="display:none">
                            </label>
                            <button class="btn-brand hover-lift" onclick="toast('Report Submitted!')" style="padding: 0.75rem 1.5rem; border-radius: 0.75rem; box-shadow: 0 8px 20px rgba(255, 77, 77, 0.3);">SUBMIT REPORT</button>
                        </div>
                    </div>

                    <div class="glass-card hover-lift" style="padding: 2.5rem; max-width: 600px; width: 100%;">
                        <h2 style="font-size: 1.875rem; font-weight: 700; margin-bottom: 0.5rem; text-align: center;">Mess Change Portal</h2>
                        <p style="color: rgba(255,255,255,0.4); font-size: 12px; margin-bottom: 1.5rem; text-align: center;">Window opens days 1–7 of every month. First 20 students only.</p>
                        
                        <div style="background: rgba(249, 115, 22, 0.1); border: 1px solid rgba(249, 115, 22, 0.3); padding: 1rem; border-radius: 0.75rem; color: #fdba74; font-size: 14px; margin-bottom: 1.5rem;">
                            <i class="fas fa-lock"></i> Window Closed. Opens on the 1st of next month.
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 1rem;">
                            <input class="input-field" placeholder="Full Name">
                            <input class="input-field" placeholder="Roll Number">
                            <select class="input-field"><option>Current Mess</option></select>
                            <select class="input-field"><option>Target Mess</option></select>
                            <button class="btn-brand hover-lift" onclick="toast('Transfer Requested')" style="padding: 1rem; border-radius: 0.75rem; font-size: 1rem; margin-bottom: 1rem;">Request Transfer</button>
                            <div style="text-align: left;">
                                <p style="color: rgba(255,255,255,0.4); font-size: 12px; margin-bottom: 0.5rem;">Upload food image (for complaint)</p>
                                <input type="file" class="input-field" style="padding: 0.5rem 1rem; font-size: 12px; cursor: pointer;">
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function getProfileHTML() {
            return `
                <div style="display: flex; flex-direction: column; gap: 2.5rem;">
                    
                    <div class="glass-card hover-lift" style="padding: 2rem; display: flex; align-items: center; justify-content: space-between; gap: 2rem; flex-wrap: wrap;">
                        <div style="display: flex; align-items: center; gap: 1.25rem; flex: 1; min-width: 250px;">
                            <div style="width: 5rem; height: 5rem; border-radius: 1.25rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--brand), var(--brand-orange)); color: white; box-shadow: 0 10px 20px rgba(255,77,77,0.2);">
                                ${state.user.name[0]}
                            </div>
                            <div>
                                <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem;">${state.user.name}</h2>
                                <div style="display: flex; gap: 0.75rem; align-items: center; font-size: 11px;">
                                    <span style="background: rgba(255,255,255,0.1); padding: 0.25rem 0.75rem; border-radius: 99px; color: white; font-weight: 600;">Student Member</span>
                                    <span style="color: rgba(255,255,255,0.4); font-weight: 600;">Class of 2026</span>
                                </div>
                            </div>
                        </div>
                        
                        <div style="display: flex; gap: 2rem; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 2rem;">
                            ${renderProfileStat('42', 'Meals', 'fa-utensils')}
                            ${renderProfileStat(state.feedback.length, 'Reviews', 'fa-star')}
                            ${renderProfileStat('89%', 'Attendance', 'fa-calendar-check')}
                        </div>

                        <div style="padding-left: 1rem;">
                            <button class="glass-card hover-lift" onclick="toast('Edit mode coming soon!')" style="width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: white; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; background: transparent;">
                                <i class="fas fa-cog" style="font-size: 1rem;"></i>
                            </button>
                        </div>
                    </div>

                    <div>
                        <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem;">Meet the Creators</h3>
                        <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.5rem;">
                            ${[{n:"Himanshu", r:"System Designer"}, {n:"Ishan", r:"Fullstack"}, {n:"Nitish", r:"Backend"}, {n:"Bhawya", r:"UI/UX"}, {n:"Muskan", r:"AI"}].map(c => `
                                <div class="glass-card hover-lift" style="padding: 1.25rem; text-align: center;">
                                    <div class="bg-gradient-brand" style="width: 3rem; height: 3rem; border-radius: 9999px; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-weight: 700;">${c.n[0]}</div>
                                    <p style="margin-top: 0.5rem; font-weight: 700;">${c.n}</p><p style="font-size: 12px; color: rgba(255,255,255,0.4);">${c.r}</p>
                                </div>`).join('')}
                        </div>
                    </div>
                </div>`;
        }

        function renderProfileStat(v, l, icon) {
            return `
            <div style="display: flex; flex-direction: column; align-items: center; min-width: 60px;">
                <p style="font-size: 1.25rem; font-weight: 800; color: white; display: flex; align-items: center; gap: 0.35rem;">
                    <i class="fas ${icon}" style="font-size: 11px; color: var(--brand);"></i> ${v}
                </p>
                <p style="font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-top: 0.25rem; font-weight: 700;">${l}</p>
            </div>`;
        }

        function renderAuth() {
            document.getElementById('content-mount').innerHTML = `
                <div style="display: flex; align-items: center; justify-content: center; min-height: 70vh;">
                    <div class="glass-card" style="padding: 3rem; width: 100%; max-width: 28rem;">
                        <h2 style="font-size: 1.875rem; font-weight: 700; text-align: center; margin-bottom: 2rem;">SmartMess Login</h2>
                        <input type="text" id="auth-name" class="input-field" style="padding: 1rem; margin-bottom: 1rem;" placeholder="Full Name">
                        <select id="auth-role" class="input-field" style="padding: 1rem; margin-bottom: 2rem;">
                            <option value="student">Student Account</option><option value="admin">Admin Account</option>
                        </select>
                        <button onclick="login()" class="btn-brand hover-lift" style="width: 100%; padding: 1rem; border-radius: 0.75rem;">LAUNCH DASHBOARD</button>
                    </div>
                </div>`;
        }

        function login() {
            const name = document.getElementById('auth-name').value;
            if (!name) return toast("Enter your name", "error");
            state.user = { name, role: document.getElementById('auth-role').value };
            localStorage.setItem('mess_user', JSON.stringify(state.user));
            toast(`Welcome, ${name}!`);
            init();
        }

        function markAttendance(type) {
            state.attendance[new Date().toDateString()] = type;
            toast(type === 'eat' ? "See you at dinner!" : "Meal skipped.");
        }

        function submitFeedback() {
            const text = document.getElementById('fb-text').value;
            if (!text) return toast("Write something!", "error");
            state.feedback.unshift({ name: state.user.name, text, sentiment: 'Positive' });
            localStorage.setItem('mess_feedback', JSON.stringify(state.feedback));
            toast(`Feedback submitted.`);
            renderFeedbackList();
        }

        function renderFeedbackList() {
            const list = document.getElementById('feedback-list');
            if (!list) return;
            list.innerHTML = state.feedback.slice(0, 3).map(f => `
                <div class="glass-card" style="padding: 1.25rem; text-align: left; border-left: 4px solid var(--brand);">
                    <p style="font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4);">${f.name}</p>
                    <p style="font-size: 14px; margin-top: 4px;">"${f.text}"</p>
                </div>`).join('');
        }

        function toast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'glass-card';
            t.style.cssText = `padding: 1rem 1.5rem; border-left: 4px solid var(--brand); background: #1a1a1c; font-weight: 700; font-size: 12px;`;
            t.innerText = msg;
            container.appendChild(t);
            gsap.fromTo(t, { x: 100, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4, ease: "back.out(1.5)" });
            setTimeout(() => gsap.to(t, { x: 100, opacity: 0, onComplete: () => t.remove() }), 3000);
        }

        function toggleChat() { 
            const win = document.getElementById('chat-window');
            if (win.style.display === 'flex') {
                gsap.to(win, { scale: 0.9, opacity: 0, duration: 0.3, onComplete: () => win.style.display = 'none' });
            } else {
                win.style.display = 'flex';
                gsap.fromTo(win, { scale: 0.9, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4 });
            }
        }

        function initDashboardChart() {
            const ctx = document.getElementById('chart-attendance');
            if(!ctx) return;
            new Chart(ctx.getContext('2d'), {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        data: [80, 75, 95, 88, 70, 92, 45],
                        borderColor: '#ff4d4d', tension: 0.4, fill: true, backgroundColor: 'rgba(255, 77, 77, 0.1)'
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.2)' } } } }
            });
        }

        function setupGlobalEvents() {
            document.getElementById('logout-btn').onclick = () => {
                localStorage.removeItem('mess_user');
                location.reload();
            };
            document.getElementById('chat-send').onclick = () => {
                const input = document.getElementById('chat-input');
                if (!input.value) return;
                const box = document.getElementById('chat-messages');
                box.innerHTML += `<div class="glass-card" style="align-self: flex-end; padding: 0.75rem; background: rgba(255,77,77,0.2); border-radius: 1rem 1rem 0 1rem; max-width: 85%;">${input.value}</div>`;
                input.value = '';
                box.scrollTop = box.scrollHeight;
            };
        }
    </script>
</body>
</html>
